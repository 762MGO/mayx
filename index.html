<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>排班助手 · 终极版</title>
<style>
  :root {
    --bg-gradient-start: #fff0f5;
    --bg-gradient-end: #e0f7fa;
    --card-bg: rgba(255, 255, 255, 0.85);
    --card-shadow: 0 8px 20px rgba(0,0,0,0.05);
    --primary: #ff8c8c;
    --primary-dark: #e06c6c;
    --text: #4a4a4a;
    --text2: #6a6a6a;
    --text3: #8a8a8a;
    --border: rgba(0,0,0,0.08);
    --red: #f26b6b;
    --green: #5cb85c;
    --blue: #5bc0de;
    --orange: #f0ad4e;
    --purple: #c06df2;
    --safe-bottom: env(safe-area-inset-bottom, 8px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
    display: flex; justify-content: center; align-items: center;
    min-height: 100dvh; font-family: -apple-system, "SF Pro Text", "PingFang SC", Helvetica, sans-serif;
  }
  .app { width:100%; max-width:430px; height:100dvh; background:transparent; display:flex; flex-direction:column; }
  .main { flex:1; overflow-y:auto; padding:12px 16px 20px; scroll-behavior:smooth; }
  .card {
    background: var(--card-bg); backdrop-filter: blur(10px); border-radius:28px;
    padding:18px 20px; margin-bottom:14px; box-shadow:var(--card-shadow); border:1px solid rgba(255,255,255,0.6);
  }
  .card-title { font-size:16px; font-weight:700; color:var(--primary-dark); margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--primary); color:white; border:none; border-radius:40px; padding:8px 18px;
    font-size:13px; font-weight:600; cursor:pointer; transition:0.1s ease; box-shadow:0 2px 6px rgba(0,0,0,0.1);
  }
  .btn:active { transform:scale(0.96); background:var(--primary-dark); }
  .btn-small { padding:5px 14px; font-size:12px; }
  .btn-outline { background:transparent; border:1px solid var(--primary); color:var(--primary-dark); box-shadow:none; }
  .btn-danger { background:rgba(242,107,107,0.15); color:var(--red); border:1px solid rgba(242,107,107,0.3); }
  .input { width:100%; padding:10px 15px; border:1px solid var(--border); border-radius:24px; font-size:14px; background:white; margin-bottom:8px; outline:none; }
  .input:focus { border-color:var(--primary); }
  .flex-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .badge { display:inline-block; padding:4px 14px; border-radius:30px; font-size:12px; font-weight:600; color:white; }
  .week-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; }
  .week-day {
    flex:0 0 65px; text-align:center; background:white; border-radius:20px; padding:10px 0;
    border:1px solid rgba(0,0,0,0.05); cursor:pointer; transition:0.1s; box-shadow:0 2px 6px rgba(0,0,0,0.02);
  }
  .week-day.today { background:var(--primary); color:white; border-color:var(--primary); }
  .week-day.selected { background:var(--primary-dark); color:white; border-color:var(--primary-dark); }
  .shift-chip {
    display:inline-block; padding:6px 16px; border-radius:40px; background:white; border:1px solid #ffe0e0;
    font-size:12px; font-weight:500; margin:4px 6px 0 0; cursor:pointer; color:var(--text2); transition:0.1s;
  }
  .shift-chip.active { background:var(--primary); color:white; border-color:var(--primary); }
  .tab-bar {
    display:flex; justify-content:space-around; background:rgba(255,255,255,0.8); backdrop-filter:blur(20px);
    border-top:1px solid rgba(0,0,0,0.05); padding:6px 12px calc(6px + var(--safe-bottom));
  }
  .tab-item { padding:8px 18px; border-radius:40px; font-size:14px; font-weight:600; color:var(--text3); cursor:pointer; transition:0.1s; }
  .tab-item.active { background:var(--primary); color:white; box-shadow:0 2px 8px rgba(255,140,140,0.3); }
  .page { display:none; }
  .page.active { display:block; }
  .countdown-num { font-size:36px; font-family:monospace; font-weight:700; letter-spacing:2px; color:var(--primary-dark); }
  .reminder-text { font-size:14px; line-height:1.5; color:var(--text); background:rgba(255,255,255,0.5); padding:10px; border-radius:20px; }
  .note-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
  .finance-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(0,0,0,0.05); color:var(--text2); }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.75); color:white; padding:8px 20px; border-radius:40px; font-size:13px; z-index:1000; pointer-events:none; }
  .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:10px; }
  .cal-day {
    background:white; border-radius:16px; padding:8px 4px; text-align:center; cursor:pointer;
    border:1px solid #ffe0e0; transition:0.1s;
  }
  .cal-day.other-month { opacity:0.5; background:#f9f9f9; }
  .cal-day.today { background:var(--primary); color:white; border-color:var(--primary); }
  .cal-day.selected { background:var(--primary-dark); color:white; border:2px solid white; }
  .cal-day .day-num { font-size:16px; font-weight:600; }
  .cal-day .shift-name { font-size:11px; font-weight:500; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cal-day .dots { display:flex; justify-content:center; gap:3px; margin-top:4px; }
  .cal-day .dot { width:4px; height:4px; border-radius:50%; }
  .today-tomorrow { display:flex; gap:12px; font-size:13px; background:rgba(255,255,255,0.6); padding:8px 12px; border-radius:40px; margin-bottom:12px; }
  .calendar-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .bottom-actions { display:flex; gap:12px; margin-top:16px; justify-content:center; }
  .stat-table { width:100%; margin-top:12px; border-collapse:collapse; font-size:14px; }
  .stat-table th, .stat-table td { padding:8px 6px; text-align:left; border-bottom:1px solid rgba(0,0,0,0.05); }
  .stat-table th { color:var(--primary-dark); font-weight:600; }
  .stat-summary { margin-top:10px; font-weight:600; color:var(--text2); }
  #statsList, #shiftStatsResult { max-height:200px; overflow-y:auto; }
</style>
</head>
<body>
<div class="app">
  <div class="main" id="mainContent">
    <!-- 今日页面 -->
    <div class="page active" id="page-today">
      <div class="card" style="background: linear-gradient(135deg, #ffdde1, #ee9ca7); color: white; backdrop-filter: none;">
        <div class="flex-row" style="justify-content: space-between; align-items: baseline;">
          <span class="badge" id="todayBadge" style="background: rgba(0,0,0,0.2);">休假</span>
          <span id="todayShiftTime" style="font-size: 22px; font-weight: 600;">休息日</span>
        </div>
        <div style="font-size: 18px; font-weight: 500; margin: 8px 0 4px;" id="realDateDisplay"></div>
        <div class="countdown-num" id="countdownDisplay">🎉</div>
        <div id="countdownLabel" style="font-size: 13px; opacity: 0.9;">今日休假</div>
      </div>
      <div class="card">
        <div class="card-title">✨ 今日专属祝福 <button class="btn btn-small btn-outline" id="refreshReminderBtn">换一句</button></div>
        <div class="reminder-text" id="reminderText">加载中...</div>
        <div class="flex-row" style="margin-top: 12px;"><button class="btn btn-small btn-outline" id="copyReminderBtn">复制</button></div>
      </div>
      <div class="card">
        <div class="card-title">📝 今日备注 <span id="todayNoteCount"></span></div>
        <div id="todayNotesList" style="max-height: 200px; overflow-y: auto;"></div>
        <div class="flex-row" style="margin-top: 12px;">
          <input type="text" class="input" id="todayNoteText" placeholder="写点啥..." style="flex:1; margin-bottom:0;">
          <button class="btn" id="addTodayNoteBtn">添加</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">💰 最近流水 <button class="btn btn-small btn-outline" id="gotoCalendarBtn">全部</button></div>
        <div id="recentFinance"></div>
        <div class="flex-row" style="margin-top: 12px;">
          <input type="number" class="input" id="quickAmount" placeholder="金额" style="flex:1;">
          <select class="input" id="quickType" style="width: 90px;"><option value="income">收入</option><option value="expense">支出</option></select>
          <button class="btn" id="quickFinanceBtn">记一笔</button>
        </div>
      </div>
    </div>

    <!-- 排班页面 -->
    <div class="page" id="page-week">
      <div class="card">
        <div class="card-title">📅 排班周视图
          <div class="flex-row"><button class="btn btn-small btn-outline" id="prevWeekBtn">‹</button><span id="weekRange"></span><button class="btn btn-small btn-outline" id="nextWeekBtn">›</button></div>
        </div>
        <div class="week-row" id="weekRow"></div>
        <div style="margin: 14px 0 8px; font-weight: 600;">选择班次</div>
        <div id="shiftChips" class="flex-row" style="gap: 6px;"></div>
        <div style="margin-top: 12px; font-size:13px; color: var(--text3);" id="weekSelectedInfo"></div>
      </div>
      <div class="card">
        <div class="card-title">📌 全部备注</div>
        <div id="notesList"></div>
        <div class="flex-row" style="margin-top: 12px;">
          <input type="date" id="noteDate" class="input" style="flex:1;">
          <input type="text" id="noteText" placeholder="备注内容" class="input" style="flex:2;">
          <button class="btn" id="addNoteBtn">添加</button>
        </div>
      </div>
    </div>

    <!-- 日历页面 -->
    <div class="page" id="page-calendar">
      <div class="card">
        <div class="today-tomorrow" id="todayTomorrowInfo">
          <span>今日班次: --</span>
          <span>明日班次: --</span>
        </div>
        <div class="calendar-nav">
          <button class="btn btn-small btn-outline" id="prevMonthBtn">‹</button>
          <span id="calMonthLabel" style="font-weight: 600; font-size: 18px;"></span>
          <button class="btn btn-small btn-outline" id="nextMonthBtn">›</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="bottom-actions">
          <button class="btn btn-small" id="gotoTodayBtn">今天</button>
          <button class="btn btn-small btn-outline" id="manualShiftBtn">手动排班</button>
        </div>
      </div>
    </div>

    <!-- 统计页面 -->
    <div class="page" id="page-stats">
      <div class="card">
        <div class="card-title">📊 区间统计</div>
        <div class="flex-row">
          <input type="date" id="statsFrom" class="input" style="flex:1;"><span>—</span>
          <input type="date" id="statsTo" class="input" style="flex:1;">
          <button class="btn" id="queryStatsBtn">查询</button>
        </div>
        <div class="flex-row" style="justify-content: space-between; margin: 14px 0;">
          <div>收入: <strong id="statsIncome" style="color: var(--green);">¥0</strong></div>
          <div>支出: <strong id="statsExpense" style="color: var(--red);">¥0</strong></div>
          <div>结余: <strong id="statsBalance">¥0</strong></div>
        </div>
        <div id="statsList"></div>
      </div>
      <div class="card">
        <div class="card-title">📋 排班统计表</div>
        <div class="flex-row">
          <input type="date" id="shiftStatFrom" class="input" style="flex:1;"><span>—</span>
          <input type="date" id="shiftStatTo" class="input" style="flex:1;">
          <button class="btn" id="queryShiftStatsBtn">查询</button>
        </div>
        <div id="shiftStatsResult"><div class="stat-summary">请选择日期范围并点击查询</div></div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab-item active" data-tab="page-today">今日</div>
    <div class="tab-item" data-tab="page-week">排班</div>
    <div class="tab-item" data-tab="page-calendar">日历</div>
    <div class="tab-item" data-tab="page-stats">统计</div>
  </div>
</div>
<div id="toastContainer"></div>
<script>
(function(){
  // ---------- 数据定义 ----------
  const STORAGE_KEY = 'schedule_pro_v5';
  const DEFAULT_SHIFTS = {
    'A2': { name:'A2', times:['8:00-11:00','12:00-16:00'], color:'#ff8c8c', short:'A2' },
    'B2': { name:'B2', times:['8:00-12:00','13:00-16:00'], color:'#5cb85c', short:'B2' },
    '治疗班': { name:'治疗班', times:['8:00-12:00','14:00-17:00'], color:'#c06df2', short:'治疗' },
    'B1': { name:'B1', times:['8:00-12:00','14:30-17:30'], color:'#f0ad4e', short:'B1' },
    '夜班': { name:'夜班', times:['23:00-次日8:00'], color:'#5bc0de', short:'夜班', overnight:true },
    '中班': { name:'中班', times:['17:00-23:00'], color:'#f26b6b', short:'中班' },
    '主班': { name:'主班', times:['14:00-17:00'], color:'#ffaa66', short:'主班' },
    '休假': { name:'休假', times:[], color:'#b0b0b0', short:'休', isRest:true }
  };
  let shifts = JSON.parse(JSON.stringify(DEFAULT_SHIFTS));
  let schedule = {};
  let finance = [];
  let notes = [];
  let reminderLog = {};
  let customShifts = {};
  let curPage = 'page-today';
  let selDate = null;
  let selWeekDay = null;
  let weekOffset = 0;
  let calYear, calMonth;

  const fmtDate = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const todayStr = () => { const d=new Date(); return fmtDate(d.getFullYear(), d.getMonth(), d.getDate()); };
  const toast = (msg) => { let c=document.getElementById('toastContainer'); let el=document.createElement('div'); el.className='toast'; el.innerText=msg; c.appendChild(el); setTimeout(()=>el.remove(),2000); };
  const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify({ shifts, schedule, finance, notes, reminderLog, customShifts, calYear, calMonth }));
  const load = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.shifts) shifts = data.shifts;
        if (data.schedule) schedule = data.schedule;
        if (data.finance) finance = data.finance;
        if (data.notes) notes = data.notes;
        if (data.reminderLog) reminderLog = data.reminderLog;
        if (data.customShifts) customShifts = data.customShifts;
        if (data.calYear !== undefined) calYear = data.calYear;
        if (data.calMonth !== undefined) calMonth = data.calMonth;
        Object.assign(shifts, customShifts);
      }
    } catch(e) {}
    if (calYear === undefined) { const d = new Date(); calYear = d.getFullYear(); calMonth = d.getMonth(); }
  };

  // ---------- 扩充祝福语库 ----------
  const appearance = ['笑容','眼睛','睫毛','眉眼','脸庞','气质','秀发','穿搭','肌肤','神采'];
  const clothing = ['裙子','衬衫','外套','配饰','风格','衣着','造型','妆容'];
  const figure = ['身材','身姿','体态','曲线','轮廓','气质'];
  const praise = ['迷人','优雅','动人','美丽','可爱','温柔','精致','完美','闪耀','甜美','明媚','飒爽','知性'];
  const lucky = ['好运连连','万事如意','心想事成','财源广进','步步高升','平安喜乐','顺风顺水','锦鲤附体','笑口常开','桃花满满','元气满满','甜蜜幸福'];

  function generateRandomBlessing() {
    const templates = [
      "今天的你{appearance}格外{praise}，{clothing}衬托出{figure}的{praise}，祝你{lucky}！",
      "你今天的{appearance}特别{praise}，{clothing}完美展现{figure}，愿你{lucky}～",
      "{clothing}让你今天的{figure}更加{praise}，{appearance}散发着{praise}光芒，祝{lucky}！",
      "今日份的{appearance}满分，{clothing}搭配凸显{figure}优势，祝你{lucky}！",
      "你的{appearance}总是那么{praise}，今天{clothing}更是锦上添花，{figure}令人{praise}，愿你{lucky}！",
      "{clothing}配{appearance}，{figure}尽显{praise}气质，祝你今天{lucky}！",
      "哇！今天的{appearance}像星星一样{praise}，{clothing}完美融合，{figure}绝了！{lucky}",
      "看到你的{appearance}心情都变好了，{clothing}太适合你了，{figure}超{praise}，{lucky}！",
      "愿你被世界温柔以待，{appearance}永远{praise}，{clothing}永远美丽，{figure}永远自信。{lucky}",
      "今天是属于你的幸运日，{appearance}闪闪发光，{clothing}加分，{figure}无敌！{lucky}"
    ];
    const tpl = templates[Math.floor(Math.random() * templates.length)];
    const randomPick = (arr) => arr[Math.floor(Math.random() * arr.length)];
    let sentence = tpl;
    sentence = sentence.replace(/\{appearance\}/g, randomPick(appearance));
    sentence = sentence.replace(/\{clothing\}/g, randomPick(clothing));
    sentence = sentence.replace(/\{figure\}/g, randomPick(figure));
    sentence = sentence.replace(/\{praise\}/g, randomPick(praise));
    sentence = sentence.replace(/\{lucky\}/g, randomPick(lucky));
    return sentence;
  }

  function getReminder() {
    const t = todayStr();
    if (reminderLog[t]) return reminderLog[t];
    const newSentence = generateRandomBlessing();
    reminderLog[t] = newSentence;
    save();
    return newSentence;
  }

  function updateReminder() {
    document.getElementById('reminderText').innerText = getReminder();
  }
  function refreshReminder() {
    const t = todayStr();
    let newSentence;
    do { newSentence = generateRandomBlessing(); } while (newSentence === reminderLog[t]);
    reminderLog[t] = newSentence;
    save();
    updateReminder();
    toast('已换一句');
  }
  function copyReminder() { const t=document.getElementById('reminderText').innerText; navigator.clipboard.writeText(t).then(()=>toast('已复制')).catch(()=>toast('复制失败')); }

  // ---------- 辅助函数 (倒计时、今日UI等) ----------
  const getRanges = (key) => {
    const st = shifts[key];
    if (!st || !st.times.length) return [];
    const parse = (s) => {
      let next = false, clean = s;
      if (s.includes('次日')) { next = true; clean = s.replace('次日',''); }
      let [h,m] = clean.split(':').map(Number);
      return { min: h*60 + (m||0), isNext: next };
    };
    return st.times.map(t => {
      let [s,e] = t.split('-');
      let start = parse(s.trim()), end = parse(e.trim());
      let startMin = start.min + (start.isNext ? 1440 : 0);
      let endMin = end.min + (end.isNext ? 1440 : 0);
      if (endMin < startMin) endMin += 1440;
      return { startMin, endMin, startStr: s.trim(), endStr: e.trim() };
    });
  };
  function updateCountdownOnly() {
    const today = todayStr();
    const shiftKey = schedule[today] || '休假';
    const shift = shifts[shiftKey] || shifts['休假'];
    const now = new Date();
    const curMin = now.getHours()*60 + now.getMinutes();
    const ranges = getRanges(shiftKey);
    const cdNum = document.getElementById('countdownDisplay');
    const cdLabel = document.getElementById('countdownLabel');
    if (!ranges.length || shift.isRest) {
      cdNum.innerText = '🎉';
      cdLabel.innerText = '今日休假';
      return;
    }
    let inWork = false, nextTarget = null, isEnd = false;
    for (let r of ranges) {
      if (curMin >= r.startMin && curMin < r.endMin) { inWork = true; nextTarget = r.endMin; break; }
    }
    if (!inWork) {
      let earliest = null;
      for (let r of ranges) if (curMin < r.startMin && (earliest === null || r.startMin < earliest)) earliest = r.startMin;
      if (earliest !== null) nextTarget = earliest;
      else isEnd = true;
    }
    if (isEnd) {
      cdNum.innerText = '✅';
      cdLabel.innerText = '今日已完成';
    } else if (nextTarget) {
      let diff = nextTarget - curMin;
      if (diff < 0) diff += 1440;
      const h = Math.floor(diff/60), m = diff%60, s = 59 - now.getSeconds();
      cdNum.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      cdLabel.innerText = inWork ? '下班倒计时' : '上班倒计时';
    } else cdNum.innerText = '--:--';
  }
  function updateTodayStatic() {
    const today = todayStr();
    const shiftKey = schedule[today] || '休假';
    const shift = shifts[shiftKey] || shifts['休假'];
    document.getElementById('todayBadge').innerText = shift.name;
    document.getElementById('todayBadge').style.background = shift.color;
    document.getElementById('todayShiftTime').innerText = shift.times.length ? shift.times.join(' | ') : '休息日';
    const nowDate = new Date();
    const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
    document.getElementById('realDateDisplay').innerText = `${nowDate.getFullYear()}年${nowDate.getMonth()+1}月${nowDate.getDate()}日 ${weekdays[nowDate.getDay()]}`;
    const todayNotes = notes.filter(n => n.date === today);
    const listDiv = document.getElementById('todayNotesList');
    const countSpan = document.getElementById('todayNoteCount');
    countSpan.innerText = todayNotes.length ? `${todayNotes.filter(n=>n.completed).length}/${todayNotes.length}` : '';

    for (let d=1; d<=daysInMonth; d++) { const ds = fmtDate(calYear, calMonth, d); cells.push(createDayCell(ds, d, false)); }
    const total = 42 - cells.length;
    for (let i=1; i<=total; i++) { const ds = fmtDate(calYear, calMonth+1, i); cells.push(createDayCell(ds, i, true)); }

  // 统计查询
  function queryStats() { const from=document.getElementById('statsFrom').value, to=document.getElementById('statsTo').value; if(!from||!to){ toast('请选择起止日期'); return; } const filtered=finance.filter(f=>f.date>=from&&f.date<=to); let inc=0,exp=0; filtered.forEach(f=>{ if(f.type==='income') inc+=f.amount; else exp+=f.amount; }); document.getElementById('statsIncome').innerHTML=`¥${inc.toFixed(2)}`; document.getElementById('statsExpense').innerHTML=`¥${exp.toFixed(2)}`; document.getElementById('statsBalance').innerHTML=`¥${(inc-exp).toFixed(2)}`; const listDiv=document.getElementById('statsList'); if(filtered.length===0) listDiv.innerHTML='<div>无记录</div>'; else listDiv.innerHTML=filtered.sort((a,b)=>b.date.localeCompare(a.date)).map(f=>`<div class="finance-item">${f.date} ${f.type==='income'?'收入':'支出'} ${f.note||''} ${f.type==='income'?'+':'-'}¥${f.amount.toFixed(2)}</div>`).join(''); }
  function queryShiftStats() { const from=document.getElementById('shiftStatFrom').value, to=document.getElementById('shiftStatTo').value; if(!from||!to){ toast('请选择排班统计的起止日期'); return; } const start=new Date(from), end=new Date(to); if(start>end){ toast('开始日期不能晚于结束日期'); return; } const shiftCount={}; let total=0; let cur=new Date(start); while(cur<=end){ const ds=fmtDate(cur.getFullYear(),cur.getMonth(),cur.getDate()); const shiftKey=schedule[ds]||'休假'; const shiftName=shifts[shiftKey]?.name||'休假'; shiftCount[shiftName]=(shiftCount[shiftName]||0)+1; total++; cur.setDate(cur.getDate()+1); } const resultDiv=document.getElementById('shiftStatsResult'); if(total===0){ resultDiv.innerHTML='<div class="stat-summary">所选区间无数据</div>'; return; } let html=`<table class="stat-table"><thead><tr><th>班次</th><th>天数</th><th>占比</th></tr></thead><tbody>`; for(const [name,cnt] of Object.entries(shiftCount)){ const pct=((cnt/total)*100).toFixed(1); html+=`<tr><td>${name}</td><td>${cnt} 天</td><td>${pct}%</td></tr>`; } html+=`</tbody></table><div class="stat-summary">统计区间：${from} 至 ${to}<br>合计 ${total} 天</div>`; resultDiv.innerHTML=html; }
  function updateStatusPills() { const container=document.getElementById('statusPills'); if(!container) return; const now=new Date(), curMin=now.getHours()*60+now.getMinutes(), today=todayStr(); const mon=getMonday(0); let html=''; const dayNames=['日','一','二','三','四','五','六']; for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); const ds=fmtDate(d.getFullYear(), d.getMonth(), d.getDate()); const sk=schedule[ds]; if(!sk||sk==='休假') continue; const st=shifts[sk]; if(!st||!st.times.length) continue; let ended=false; if(ds===today){ const ranges=getRanges(sk); ended=ranges.every(r=>curMin>=r.endMin); } else if(ds<today) ended=true; const endedClass=ended?' ended':''; html+=`<span class="status-pill ${endedClass}" style="color:${st.color}; border-color:${st.color}40; background:${st.color}10">${dayNames[d.getDay()]} ${st.name}</span>`; } if(!html) html='<span style="font-size:10px;color:var(--text3)">本周无排班</span>'; container.innerHTML=html; }
  function escapeHtml(str){ return str.replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    }
  }

  // 绑定事件
  document.getElementById('refreshReminderBtn').addEventListener('click',refreshReminder);
  document.getElementById('copyReminderBtn').addEventListener('click',copyReminder);
  document.getElementById('addTodayNoteBtn').addEventListener('click',addTodayNote);
  document.getElementById('gotoCalendarBtn').addEventListener('click',()=>switchTab('page-calendar'));
  document.getElementById('quickFinanceBtn').addEventListener('click',addQuickFinance);
  document.getElementById('prevWeekBtn').addEventListener('click',()=>{ weekOffset--; renderWeek(); updateStatusPills(); });
  document.getElementById('nextWeekBtn').addEventListener('click',()=>{ weekOffset++; renderWeek(); updateStatusPills(); });
  document.getElementById('addNoteBtn').addEventListener('click',addNote);
  document.getElementById('prevMonthBtn').addEventListener('click',()=>changeMonth(-1));
  document.getElementById('nextMonthBtn').addEventListener('click',()=>changeMonth(1));
  document.getElementById('queryStatsBtn').addEventListener('click',queryStats);
  document.getElementById('queryShiftStatsBtn').addEventListener('click',queryShiftStats);
  document.getElementById('gotoTodayBtn')?.addEventListener('click',gotoToday);
  document.getElementById('manualShiftBtn')?.addEventListener('click',manualShift);
  document.querySelectorAll('.tab-item').forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.dataset.tab)));

  // 初始化
  load(); const t=todayStr(); selDate=t; selWeekDay=t;
  document.getElementById('statsFrom').value=t; document.getElementById('statsTo').value=t;
  document.getElementById('shiftStatFrom').value=t; document.getElementById('shiftStatTo').value=t;
  document.getElementById('noteDate').value=t;
  updateReminder(); updateTodayUI(); renderWeek(); renderCalendar(); renderNotesList(); updateStatusPills();
  setInterval(()=>{ if(curPage==='page-today') updateCountdownOnly(); updateStatusPills(); },1000);
  switchTab('page-today');
})();
</script>
